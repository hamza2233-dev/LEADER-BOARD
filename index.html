<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alixo BPO | Precision Payroll & Awards</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --purple: #bc8cff;
            --gold: #f1c40f;
            --text-main: #c9d1d9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1400px; margin: auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .company-name { color: var(--blue); font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        
        /* Awards Section */
        .awards-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .award-card { background: linear-gradient(145deg, #1c2128, #161b22); border: 2px solid var(--gold); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; }
        .award-card::after { content: '★'; position: absolute; right: -10px; bottom: -20px; font-size: 8rem; color: rgba(241, 196, 15, 0.05); }
        .award-icon { font-size: 3rem; }
        .award-info h3 { margin: 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .award-info p { margin: 5px 0 0; font-size: 1.8rem; font-weight: 800; color: #fff; }

        .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .stat-card { background: rgba(48, 54, 61, 0.3); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: #8b949e; text-transform: uppercase; font-size: 0.75rem; text-align: center; }
        td { padding: 15px; text-align: center; font-size: 1.05rem; font-weight: 600; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .row-item { background: rgba(255,255,255,0.02); }
        
        .agent-name { text-align: left; padding-left: 20px; color: #ffffff; border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; min-width: 180px; }
        .last-col { border-radius: 0 8px 8px 0; border-right: 1px solid var(--border); }

        .badge { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin: 2px; }
        .bg-app { background: rgba(46, 160, 67, 0.15); color: var(--green); border: 1px solid var(--green); }
        .salary-highlight { color: var(--green); font-size: 1.2rem; font-family: 'Courier New', monospace; }
        .target-needed { font-size: 0.75rem; color: #8b949e; display: block; margin-top: 4px; font-family: sans-serif; font-weight: 400; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="company-name">Alixo BPO</h1>
        <div id="date-info" style="color: #8b949e; margin-top: 5px;">Performance & Payroll Dashboard</div>
    </header>

    <!-- NEW AWARDS SECTION -->
    <div class="awards-container">
        <div class="award-card">
            <div class="award-icon">🏆</div>
            <div class="award-info">
                <h3>Agent of the Month</h3>
                <p id="top-agent-month">Loading...</p>
            </div>
        </div>
        <div class="award-card" style="border-color: var(--blue);">
            <div class="award-icon">⚡</div>
            <div class="award-info">
                <h3 style="color: var(--blue);">Agent of the Day</h3>
                <p id="top-agent-day">Loading...</p>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><span>TOTAL LEADS</span><span id="center-total" class="stat-number" style="color:var(--blue)">0</span></div>
        <div class="stat-card"><span>APPROVED</span><span id="center-approved" class="stat-number" style="color:var(--green)">0</span></div>
        <div class="stat-card"><span>PENDING</span><span id="center-pending" class="stat-number" style="color:var(--yellow)">0</span></div>
        <div class="stat-card"><span>REJECTED</span><span id="center-unapproved" class="stat-number" style="color:var(--red)">0</span></div>
        <div class="stat-card"><span>MTD PAYROLL</span><span id="center-payroll" class="stat-number" style="color:var(--green)">Rs 0</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th class="agent-name">Agent Name</th>
                <th>Total Leads</th>
                <th>Approved</th>
                <th>Daily Avg</th>
                <th>Expected Salary</th>
                <th class="last-col">Breakdown</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";

    function calculateSalary(approvedLeads) {
        if (approvedLeads === 0) return 0;
        if (approvedLeads < 30) return approvedLeads * 800;
        return 25000 + ((approvedLeads - 30) * 500);
    }

    async function refreshLeaderboard() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0 && !l.includes('{'));
            const dataRows = lines.slice(1);

            const agentData = {};
            let totalPayroll = 0;

            dataRows.forEach(row => {
                const parts = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/);
                let name = (parts[0] || "Unknown").replace(/\"/g, "").trim().toUpperCase();
                let status = (parts[2] || "Not Approved").replace(/\"/g, "").trim().toLowerCase();

                if (!agentData[name]) agentData[name] = { name, total: 0, app: 0, pend: 0, unapp: 0 };
                agentData[name].total++;
                if (status === 'approved') agentData[name].app++;
                else if (status === 'pending') agentData[name].pend++;
                else agentData[name].unapp++;
            });

            const sortedAgents = Object.values(agentData).sort((a, b) => b.app - a.app);

            // Set Agent of the Month (Top Approved)
            if(sortedAgents.length > 0) {
                document.getElementById('top-agent-month').innerText = sortedAgents[0].name;
                // For 'Agent of the Day', we use the person with highest total activity in this fetch
                // (In a real date-filtered sheet, we would filter for today's date specifically)
                document.getElementById('top-agent-day').innerText = sortedAgents[0].app > 0 ? sortedAgents[0].name : "Starting Day...";
            }

            let tableContent = '';
            sortedAgents.forEach((agent, index) => {
                const salary = calculateSalary(agent.app);
                totalPayroll += salary;
                
                let targetText = agent.app < 30 
                    ? `<span class="target-needed">${30 - agent.app} more to hit 25k</span>`
                    : `<span class="target-needed" style="color:var(--blue)">+500 PKR / lead</span>`;

                tableContent += `
                    <tr class="row-item">
                        <td>${index + 1}</td>
                        <td class="agent-name">${agent.name} ${index === 0 ? '👑' : ''}</td>
                        <td style="color:var(--blue)">${agent.total}</td>
                        <td style="color:var(--green)">${agent.app}</td>
                        <td style="color:var(--purple)">${(agent.total / 22).toFixed(1)}</td>
                        <td class="salary-highlight">Rs ${salary.toLocaleString()}${targetText}</td>
                        <td class="last-col">
                            <span class="badge bg-app">${agent.app} APP</span>
                        </td>
                    </tr>`;
            });

            document.getElementById('leaderboard-body').innerHTML = tableContent;
            document.getElementById('center-payroll').innerText = "Rs " + totalPayroll.toLocaleString();
            
        } catch (err) { console.error(err); }
    }

    refreshLeaderboard();
    setInterval(refreshLeaderboard, 15000);
</script>
</body>
</html>

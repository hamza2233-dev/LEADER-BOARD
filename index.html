<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alixo BPO | Precision Analytics</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --purple: #bc8cff;
            --text-main: #c9d1d9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1400px; margin: auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-wrap: wrap; gap: 20px; }
        .company-name { color: var(--blue); font-size: 2.2rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 3px; }

        /* Filter Controls */
        .controls { display: flex; gap: 10px; background: rgba(48, 54, 61, 0.2); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        select, input { background: #0d1117; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 5px; outline: none; cursor: pointer; }
        .custom-range { display: none; gap: 10px; align-items: center; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(48, 54, 61, 0.3); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; font-weight: bold; }
        .stat-number { font-size: 1.6rem; font-weight: bold; display: block; margin-top: 5px; }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 1000px; }
        th { padding: 15px; color: #8b949e; text-transform: uppercase; font-size: 0.75rem; text-align: center; }
        td { padding: 15px; text-align: center; font-size: 1.05rem; font-weight: 600; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .row-item { background: rgba(255,255,255,0.02); }
        
        .agent-name { text-align: left; padding-left: 20px; color: #ffffff; border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; }
        .last-col { border-radius: 0 8px 8px 0; border-right: 1px solid var(--border); }

        .badge { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin: 2px; border: 1px solid transparent; }
        .bg-app { background: rgba(46, 160, 67, 0.15); color: var(--green); border-color: var(--green); }
        .bg-pend { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border-color: var(--yellow); }
        .bg-unapp { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: var(--red); }
        
        .salary-highlight { color: var(--green); font-size: 1.2rem; font-family: 'Courier New', monospace; }
        .target-needed { font-size: 0.75rem; color: #8b949e; display: block; margin-top: 4px; font-family: sans-serif; font-weight: 400; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="company-name">Alixo BPO</h1>
        <div class="controls">
            <select id="timeframe" onchange="handleTimeframeChange()">
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
                <option value="this-week">This Week</option>
                <option value="last-week">Last Week</option>
                <option value="this-month" selected>This Month</option>
                <option value="last-month">Last Month</option>
                <option value="custom">Custom Range</option>
            </select>
            <div id="custom-inputs" class="custom-range">
                <input type="date" id="start-date" onchange="refreshLeaderboard()">
                <input type="date" id="end-date" onchange="refreshLeaderboard()">
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-card"><span class="stat-label">TOTAL LEADS</span><span id="center-total" class="stat-number" style="color:var(--blue)">0</span></div>
        <div class="stat-card"><span class="stat-label">APPROVED</span><span id="center-approved" class="stat-number" style="color:var(--green)">0</span></div>
        <div class="stat-card"><span class="stat-label">PENDING</span><span id="center-pending" class="stat-number" style="color:var(--yellow)">0</span></div>
        <div class="stat-card"><span class="stat-label">REJECTED</span><span id="center-unapproved" class="stat-number" style="color:var(--red)">0</span></div>
        <div class="stat-card"><span class="stat-label">EXPECTED PAYROLL</span><span id="center-payroll" class="stat-number" style="color:var(--green)">Rs 0</span></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th class="agent-name">Agent Name</th>
                    <th>Total Leads</th>
                    <th>Approved</th>
                    <th>Daily Avg (App)</th>
                    <th>Expected Salary</th>
                    <th class="last-col">Status Breakdown</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";

    function handleTimeframeChange() {
        const val = document.getElementById('timeframe').value;
        document.getElementById('custom-inputs').style.display = (val === 'custom') ? 'flex' : 'none';
        refreshLeaderboard();
    }

    function getDateRange(filter) {
        let start = new Date(), end = new Date();
        start.setHours(0,0,0,0); end.setHours(23,59,59,999);

        if (filter === 'yesterday') {
            start.setDate(start.getDate() - 1);
            end.setDate(end.getDate() - 1);
        } else if (filter === 'this-week') {
            start.setDate(start.getDate() - start.getDay());
        } else if (filter === 'last-week') {
            start.setDate(start.getDate() - start.getDay() - 7);
            end = new Date(start);
            end.setDate(end.getDate() + 6);
            end.setHours(23,59,59);
        } else if (filter === 'this-month') {
            start.setDate(1);
        } else if (filter === 'last-month') {
            start.setMonth(start.getMonth() - 1);
            start.setDate(1);
            end = new Date(start.getFullYear(), start.getMonth() + 1, 0);
            end.setHours(23,59,59);
        } else if (filter === 'custom') {
            start = new Date(document.getElementById('start-date').value || 0);
            end = new Date(document.getElementById('end-date').value || Date.now());
            end.setHours(23,59,59);
        }
        return { start, end };
    }

    function getWorkingDays(start, end) {
        let count = 0;
        let cur = new Date(start);
        while (cur <= end && cur <= new Date()) {
            const day = cur.getDay();
            if (day !== 0 && day !== 6) count++;
            cur.setDate(cur.getDate() + 1);
        }
        return count > 0 ? count : 1;
    }

    function calculateSalary(app) {
        if (app === 0) return 0;
        return (app < 30) ? (app * 800) : (25000 + ((app - 30) * 500));
    }

    async function refreshLeaderboard() {
        try {
            const filter = document.getElementById('timeframe').value;
            const { start, end } = getDateRange(filter);
            const workDays = getWorkingDays(start, end);

            const response = await fetch(csvUrl);
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0 && !l.includes('{'));
            const dataRows = lines.slice(1);

            const agentData = {};
            let gTotal = 0, gApp = 0, gPend = 0, gUnapp = 0, totalPayroll = 0;

            dataRows.forEach(row => {
                const parts = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/);
                const leadDate = new Date(parts[3]?.replace(/\"/g, "").trim());
                
                if (leadDate >= start && leadDate <= end) {
                    let name = (parts[0] || "Unknown").replace(/\"/g, "").trim().toUpperCase();
                    let status = (parts[2] || "Not Approved").replace(/\"/g, "").trim().toLowerCase();

                    if (!agentData[name]) agentData[name] = { name, total: 0, app: 0, pend: 0, unapp: 0 };
                    agentData[name].total++;
                    gTotal++;

                    if (status === 'approved') { agentData[name].app++; gApp++; }
                    else if (status === 'pending') { agentData[name].pend++; gPend++; }
                    else { agentData[name].unapp++; gUnapp++; }
                }
            });

            const sortedAgents = Object.values(agentData).sort((a, b) => b.app - a.app);
            let tableContent = '';
            
            sortedAgents.forEach((agent, index) => {
                // FIXED: Now calculates average based on APPROVED leads
                const avg = (agent.app / workDays).toFixed(2);
                const salary = calculateSalary(agent.app);
                totalPayroll += salary;
                
                let targetText = agent.app < 30 
                    ? `<span class="target-needed">${30 - agent.app} more leads to reach 25,000</span>`
                    : `<span class="target-needed" style="color:var(--blue)">+500 PKR for next approved lead</span>`;

                tableContent += `
                    <tr class="row-item">
                        <td>${index + 1}</td>
                        <td class="agent-name">${agent.name}</td>
                        <td style="color:var(--blue)">${agent.total}</td>
                        <td style="color:var(--green)">${agent.app}</td>
                        <td style="color:var(--purple)">${avg}</td>
                        <td class="salary-highlight">Rs ${salary.toLocaleString()}${targetText}</td>
                        <td class="last-col">
                            <span class="badge bg-app">${agent.app} APP</span>
                            <span class="badge bg-pend">${agent.pend} PND</span>
                            <span class="badge bg-unapp">${agent.unapp} REJ</span>
                        </td>
                    </tr>`;
            });

            document.getElementById('center-total').innerText = gTotal;
            document.getElementById('center-approved').innerText = gApp;
            document.getElementById('center-pending').innerText = gPend;
            document.getElementById('center-unapproved').innerText = gUnapp;
            document.getElementById('center-payroll').innerText = "Rs " + totalPayroll.toLocaleString();
            document.getElementById('leaderboard-body').innerHTML = tableContent || '<tr><td colspan="7">No data for this period</td></tr>';
        } catch (err) { console.error(err); }
    }

    refreshLeaderboard();
    setInterval(() => { if(document.getElementById('timeframe').value !== 'custom') refreshLeaderboard(); }, 15000);
</script>
</body>
</html>

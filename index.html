<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alixo BPO | Analytics Dashboard</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --text-main: #c9d1d9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1300px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .company-name { color: var(--blue); font-size: 2.2rem; font-weight: 800; margin: 0; }

        /* Filter Controls */
        .controls { display: flex; gap: 10px; flex-wrap: wrap; background: var(--card-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        select, input { background: #0d1117; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 5px; outline: none; }
        .custom-range { display: none; gap: 10px; align-items: center; }

        /* Stats Grid */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; display: block; }
        .stat-number { font-size: 1.4rem; font-weight: bold; margin-top: 5px; display: block; }

        /* Table */
        .table-wrapper { width: 100%; overflow-x: auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { padding: 15px; color: #8b949e; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .agent-name { text-align: left; padding-left: 20px; color: #fff; font-weight: bold; }
        .salary { color: var(--green); font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="company-name">ALIXO BPO</h1>
        <div class="controls">
            <select id="timeframe" onchange="handleTimeframeChange()">
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
                <option value="this-week">This Week</option>
                <option value="last-week">Last Week</option>
                <option value="this-month" selected>This Month (MTD)</option>
                <option value="last-month">Last Month</option>
                <option value="custom">Custom Range</option>
            </select>
            <div id="custom-inputs" class="custom-range">
                <input type="date" id="start-date" onchange="updateDashboard()">
                <input type="date" id="end-date" onchange="updateDashboard()">
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-card"><span class="stat-label">Total Leads</span><span id="c-total" class="stat-number" style="color:var(--blue)">0</span></div>
        <div class="stat-card"><span class="stat-label">Approved</span><span id="c-app" class="stat-number" style="color:var(--green)">0</span></div>
        <div class="stat-card"><span class="stat-label">Pending</span><span id="c-pend" class="stat-number" style="color:var(--yellow)">0</span></div>
        <div class="stat-card"><span class="stat-label">Rejected</span><span id="c-rej" class="stat-number" style="color:var(--red)">0</span></div>
        <div class="stat-card"><span class="stat-label">Expected Payroll</span><span id="c-pay" class="stat-number" style="color:var(--green)">Rs 0</span></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th class="agent-name">Agent Name</th>
                    <th>Leads</th>
                    <th>Approved</th>
                    <th>Performance Salary</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";

    function handleTimeframeChange() {
        const val = document.getElementById('timeframe').value;
        document.getElementById('custom-inputs').style.display = (val === 'custom') ? 'flex' : 'none';
        updateDashboard();
    }

    function getDateRange(filter) {
        let start = new Date(), end = new Date();
        start.setHours(0,0,0,0); end.setHours(23,59,59,999);

        if (filter === 'yesterday') {
            start.setDate(start.getDate() - 1);
            end.setDate(end.getDate() - 1);
        } else if (filter === 'this-week') {
            start.setDate(start.getDate() - start.getDay());
        } else if (filter === 'last-week') {
            start.setDate(start.getDate() - start.getDay() - 7);
            end.setDate(start.getDate() + 6);
        } else if (filter === 'this-month') {
            start.setDate(1);
        } else if (filter === 'last-month') {
            start.setMonth(start.getMonth() - 1);
            start.setDate(1);
            end = new Date(start.getFullYear(), start.getMonth() + 1, 0);
        } else if (filter === 'custom') {
            start = new Date(document.getElementById('start-date').value || 0);
            end = new Date(document.getElementById('end-date').value || Date.now());
            end.setHours(23,59,59);
        }
        return { start, end };
    }

    function calculateSalary(app) {
        if (app === 0) return 0;
        return (app < 30) ? (app * 800) : (25000 + ((app - 30) * 500));
    }

    async function updateDashboard() {
        try {
            const res = await fetch(csvUrl);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            const filter = document.getElementById('timeframe').value;
            const { start, end } = getDateRange(filter);

            const agents = {};
            let tTotal = 0, tApp = 0, tPend = 0, tRej = 0, tPay = 0;

            rows.forEach(row => {
                const col = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/);
                if (col.length < 4) return;

                const date = new Date(col[3].replace(/\"/g, "").trim());
                if (date < start || date > end) return;

                const name = col[0].replace(/\"/g, "").trim().toUpperCase();
                const status = col[2].replace(/\"/g, "").trim().toLowerCase();

                if (!agents[name]) agents[name] = { name, total: 0, app: 0, pend: 0, rej: 0 };
                
                agents[name].total++;
                tTotal++;
                if (status === 'approved') { agents[name].app++; tApp++; }
                else if (status === 'pending') { agents[name].pend++; tPend++; }
                else { agents[name].rej++; tRej++; }
            });

            const sorted = Object.values(agents).sort((a, b) => b.app - a.app);
            let html = '';
            sorted.forEach((agent, i) => {
                const salary = calculateSalary(agent.app);
                tPay += salary;
                html += `<tr><td>${i+1}</td><td class="agent-name">${agent.name}</td><td>${agent.total}</td><td style="color:var(--green)">${agent.app}</td><td class="salary">Rs ${salary.toLocaleString()}</td></tr>`;
            });

            document.getElementById('leaderboard-body').innerHTML = html;
            document.getElementById('c-total').innerText = tTotal;
            document.getElementById('c-app').innerText = tApp;
            document.getElementById('c-pend').innerText = tPend;
            document.getElementById('c-rej').innerText = tRej;
            document.getElementById('c-pay').innerText = "Rs " + tPay.toLocaleString();
        } catch (e) { console.log(e); }
    }

    updateDashboard();
    setInterval(() => { if(document.getElementById('timeframe').value !== 'custom') updateDashboard(); }, 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alixo BPO | Control Panel</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922; /* For Late */
            --orange: #f0883e; /* For Half Day */
            --text-main: #c9d1d9;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
        
        .view-switcher { display: flex; background: #0d1117; padding: 4px; border-radius: 6px; border: 1px solid var(--border); }
        .view-btn { padding: 6px 15px; border-radius: 4px; cursor: pointer; border: none; color: #8b949e; background: transparent; font-weight: 600; }
        .view-btn.active { background: var(--blue); color: #0d1117; }

        .table-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #1c2128; padding: 12px; text-align: left; font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        /* Custom Status Badges */
        .status-pill { padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .p-bg { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .a-bg { background: rgba(248, 81, 73, 0.15); color: var(--red); }
        .l-bg { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
        .hd-bg { background: rgba(240, 136, 62, 0.15); color: var(--orange); }
        .off-bg { background: rgba(139, 148, 158, 0.15); color: #8b949e; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0; color:var(--blue)">ALIXO BPO</h2>
        <div class="view-switcher">
            <button class="view-btn active" onclick="show('perf')">Sales</button>
            <button class="view-btn" onclick="show('att')">Attendance</button>
        </div>
    </header>

    <!-- ATTENDANCE SECTION -->
    <div id="att-section" class="table-container">
        <table>
            <thead>
                <tr><th>Agent</th><th>Status (Today)</th><th>Monthly Total (P|L|HD)</th></tr>
            </thead>
            <tbody id="att-table"></tbody>
        </table>
    </div>

    <!-- PERFORMANCE SECTION -->
    <div id="perf-section" class="table-container hidden">
        <table>
            <thead>
                <tr><th>Agent</th><th>Approved</th><th>Expected Pay</th></tr>
            </thead>
            <tbody id="perf-table"></tbody>
        </table>
    </div>
</div>

<script>
    // Your published CSV Link
    const attUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";

    function show(view) {
        document.getElementById('perf-section').classList.toggle('hidden', view !== 'perf');
        document.getElementById('att-section').classList.toggle('hidden', view !== 'att');
        document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(view)));
    }

    async function loadData() {
        try {
            const res = await fetch(attUrl);
            const data = await res.text();
            const rows = data.split('\n');
            
            const today = new Date().getDate(); 
            let attHtml = '';
            let perfHtml = '';

            // 1. Identify which column in your sheet (Row 11) matches Today's Date
            const dateHeaders = rows[10].split(','); 
            const todayIndex = dateHeaders.findIndex(cell => cell.trim() == today);

            // 2. Loop through agents (Row 12 onwards)
            for (let i = 11; i < rows.length; i++) {
                const cols = rows[i].split(',');
                const name = cols[2]?.trim().toUpperCase(); // Column C
                
                if (name && name !== "NAME" && name !== "") {
                    const rawVal = cols[todayIndex]?.trim().toUpperCase() || "OFF";
                    
                    // Map Status
                    let status = "Weekly Off", cls = "off-bg";
                    if (rawVal === "P") { status = "Present"; cls = "p-bg"; }
                    if (rawVal === "A") { status = "Absent"; cls = "a-bg"; }
                    if (rawVal === "L") { status = "Late"; cls = "l-bg"; }
                    if (rawVal === "H/D") { status = "Half Day"; cls = "hd-bg"; }

                    // Count totals for the month
                    const rowData = cols.slice(3); // Dates start from Column D
                    const pCount = rowData.filter(x => x.trim() === "P").length;
                    const lCount = rowData.filter(x => x.trim() === "L").length;
                    const hCount = rowData.filter(x => x.trim() === "H/D").length;

                    // Note: If you add your Sales sheet later, we can link 'Approved' leads here
                    const approved = 0; 
                    const salary = approved < 30 ? approved * 800 : 25000 + (approved - 30) * 500;

                    attHtml += `<tr>
                        <td><b>${name}</b></td>
                        <td><span class="status-pill ${cls}">${status}</span></td>
                        <td><small>${pCount}P | ${lCount}L | ${hCount}HD</small></td>
                    </tr>`;

                    perfHtml += `<tr>
                        <td><b>${name}</b></td>
                        <td>${approved}</td>
                        <td>Rs ${salary.toLocaleString()}</td>
                    </tr>`;
                }
            }
            document.getElementById('att-table').innerHTML = attHtml;
            document.getElementById('perf-table').innerHTML = perfHtml;

        } catch (err) { console.error("Error:", err); }
    }

    loadData();
    setInterval(loadData, 60000);
</script>
</body>
</html>

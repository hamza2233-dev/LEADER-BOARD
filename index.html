<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alixo BPO | Precision Payroll Tracker</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --purple: #bc8cff;
            --text-main: #c9d1d9;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1400px; margin: auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); position: relative; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; position: relative; }
        .company-name { color: var(--blue); font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .tagline { color: var(--purple); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; opacity: 0.8; }
        
        /* Filters UI */
        .filter-container { position: absolute; top: 0; right: 0; display: flex; align-items: center; gap: 10px; }
        select, input[type="date"] { background: #0d1117; color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-weight: 600; outline: none; }
        #custom-inputs { display: none; gap: 5px; align-items: center; }
        label { font-size: 0.75rem; color: #8b949e; }

        .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .stat-card { background: rgba(48, 54, 61, 0.3); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: #8b949e; text-transform: uppercase; font-size: 0.75rem; text-align: center; }
        td { padding: 15px; text-align: center; font-size: 1.05rem; font-weight: 600; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .row-item { background: rgba(255,255,255,0.02); transition: 0.3s; }
        .row-item:hover { background: rgba(255,255,255,0.05); }
        
        .agent-name { text-align: left; padding-left: 20px; color: #ffffff; border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; min-width: 180px; }
        .last-col { border-radius: 0 8px 8px 0; border-right: 1px solid var(--border); }

        .badge { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin: 2px; border: 1px solid transparent; }
        .bg-app { background: rgba(46, 160, 67, 0.15); color: var(--green); border-color: var(--green); }
        .bg-pend { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border-color: var(--yellow); }
        .bg-unapp { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: var(--red); }
        
        .salary-highlight { color: var(--green); font-size: 1.2rem; font-family: 'Courier New', monospace; }
        .target-needed { font-size: 0.75rem; color: #8b949e; display: block; margin-top: 4px; font-weight: 400; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="filter-container">
            <select id="timeframe-select" onchange="toggleCustomRange()">
                <option value="today">Today</option>
                <option value="yesterday">Yesterday</option>
                <option value="this-week">This Week</option>
                <option value="last-week">Last Week</option>
                <option value="this-month" selected>This Month</option>
                <option value="last-month">Last Month</option>
                <option value="custom">Custom Range</option>
                <option value="all-time">All Time</option>
            </select>
            <div id="custom-inputs">
                <label>From:</label><input type="date" id="start-date" onchange="refreshLeaderboard()">
                <label>To:</label><input type="date" id="end-date" onchange="refreshLeaderboard()">
            </div>
        </div>
        <h1 class="company-name">Alixo BPO</h1>
        <div class="tagline">Let's Grow Together</div>
        <div id="date-info" style="color: #8b949e; margin-top:10px;">Dashboard Syncing...</div>
    </header>

    <div class="stats-bar">
        <div class="stat-card"><span>TOTAL LEADS</span><span id="center-total" class="stat-number" style="color:var(--blue)">0</span></div>
        <div class="stat-card"><span>APPROVED</span><span id="center-approved" class="stat-number" style="color:var(--green)">0</span></div>
        <div class="stat-card"><span>PENDING</span><span id="center-pending" class="stat-number" style="color:var(--yellow)">0</span></div>
        <div class="stat-card"><span>REJECTED</span><span id="center-unapproved" class="stat-number" style="color:var(--red)">0</span></div>
        <div class="stat-card"><span>EST. PAYROLL</span><span id="center-payroll" class="stat-number" style="color:var(--green)">Rs 0</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th class="agent-name">Agent Name</th>
                <th>Total Leads</th>
                <th>Approved</th>
                <th>Daily Avg</th>
                <th>Expected Salary</th>
                <th class="last-col">Status Breakdown</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";

    // Toggle Custom Inputs
    function toggleCustomRange() {
        const filter = document.getElementById('timeframe-select').value;
        document.getElementById('custom-inputs').style.display = (filter === 'custom') ? 'flex' : 'none';
        refreshLeaderboard();
    }

    function calculateSalary(approvedLeads) {
        if (approvedLeads === 0) return 0;
        // User requested: 25k for 30 leads, then 500 PKR per extra lead.
        if (approvedLeads < 30) return approvedLeads * 800;
        return 25000 + ((approvedLeads - 30) * 500);
    }

    async function refreshLeaderboard() {
        const filter = document.getElementById('timeframe-select').value;
        const now = new Date();
        now.setHours(0,0,0,0);
        
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0 && !l.includes('{'));
            const dataRows = lines.slice(1);

            const agentData = {};
            let gTotal = 0, gApp = 0, gPend = 0, gUnapp = 0, totalPayroll = 0;

            dataRows.forEach(row => {
                const parts = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/);
                
                // Column D (Index 3) - User format: 4/15/2026 21:52
                const rawDateStr = parts[3]?.replace(/\"/g, "").trim();
                if (!rawDateStr) return;

                const recordDate = new Date(rawDateStr);
                recordDate.setHours(0,0,0,0); // Ignore time for comparison
                
                let isMatch = false;

                if (filter === "today") {
                    isMatch = recordDate.getTime() === now.getTime();
                } else if (filter === "yesterday") {
                    const yesterday = new Date(now);
                    yesterday.setDate(now.getDate() - 1);
                    isMatch = recordDate.getTime() === yesterday.getTime();
                } else if (filter === "this-month") {
                    isMatch = recordDate.getMonth() === now.getMonth() && recordDate.getFullYear() === now.getFullYear();
                } else if (filter === "last-month") {
                    const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    isMatch = recordDate.getMonth() === lastMonth.getMonth() && recordDate.getFullYear() === lastMonth.getFullYear();
                } else if (filter === "this-week") {
                    const startOfWeek = new Date(now);
                    startOfWeek.setDate(now.getDate() - now.getDay());
                    isMatch = recordDate >= startOfWeek && recordDate <= now;
                } else if (filter === "last-week") {
                    const endOfLastWeek = new Date(now);
                    endOfLastWeek.setDate(now.getDate() - now.getDay() - 1);
                    const startOfLastWeek = new Date(endOfLastWeek);
                    startOfLastWeek.setDate(endOfLastWeek.getDate() - 6);
                    isMatch = recordDate >= startOfLastWeek && recordDate <= endOfLastWeek;
                } else if (filter === "custom") {
                    const s = document.getElementById('start-date').value;
                    const e = document.getElementById('end-date').value;
                    if (s && e) {
                        const start = new Date(s); start.setHours(0,0,0,0);
                        const end = new Date(e); end.setHours(0,0,0,0);
                        isMatch = recordDate >= start && recordDate <= end;
                    }
                } else {
                    isMatch = true; // All Time
                }

                if (!isMatch) return;

                let name = (parts[0] || "Unknown").replace(/\"/g, "").trim().toUpperCase();
                let status = (parts[2] || "Not Approved").replace(/\"/g, "").trim().toLowerCase();

                if (!agentData[name]) agentData[name] = { name, total: 0, app: 0, pend: 0, unapp: 0 };
                
                agentData[name].total++;
                gTotal++;
                if (status === 'approved') { agentData[name].app++; gApp++; }
                else if (status === 'pending') { agentData[name].pend++; gPend++; }
                else { agentData[name].unapp++; gUnapp++; }
            });

            const sortedAgents = Object.values(agentData).sort((a, b) => b.app - a.app);
            let tableContent = '';
            
            sortedAgents.forEach((agent, index) => {
                const salary = calculateSalary(agent.app);
                totalPayroll += salary;
                const targetText = agent.app < 30 ? 
                    `<span class="target-needed">${30 - agent.app} more leads to 25k PKR</span>` : 
                    `<span class="target-needed" style="color:var(--blue)">Bonus Level: +500/lead</span>`;

                tableContent += `
                    <tr class="row-item">
                        <td>${index + 1}</td>
                        <td class="agent-name">${agent.name}</td>
                        <td>${agent.total}</td>
                        <td style="color:var(--green)">${agent.app}</td>
                        <td>${(agent.total / 22).toFixed(1)}</td>
                        <td class="salary-highlight">Rs ${salary.toLocaleString()}${targetText}</td>
                        <td class="last-col">
                            <span class="badge bg-app">${agent.app} APP</span>
                            <span class="badge bg-pend">${agent.pend} PND</span>
                            <span class="badge bg-unapp">${agent.unapp} REJ</span>
                        </td>
                    </tr>`;
            });

            document.getElementById('center-total').innerText = gTotal;
            document.getElementById('center-approved').innerText = gApp;
            document.getElementById('center-pending').innerText = gPend;
            document.getElementById('center-unapproved').innerText = gUnapp;
            document.getElementById('center-payroll').innerText = "Rs " + totalPayroll.toLocaleString();
            document.getElementById('leaderboard-body').innerHTML = tableContent;
            document.getElementById('date-info').innerText = `${filter.replace('-', ' ').toUpperCase()} View Active`;

        } catch (err) { console.error("Data Load Error:", err); }
    }

    refreshLeaderboard();
    setInterval(refreshLeaderboard, 45000); // 45s refresh to save bandwidth
</script>
</body>
</html>

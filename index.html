<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alixo BPO | Monthly Performance</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --blue: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --purple: #bc8cff;
            --text-main: #c9d1d9;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; padding: 20px;
        }

        .container { 
            width: 100%; max-width: 1100px; margin: auto; 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 16px; padding: 30px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
        }

        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .company-name { color: var(--blue); font-size: 2.5rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .dashboard-title { color: #8b949e; font-size: 1.1rem; margin-top: 5px; }

        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(48, 54, 61, 0.3); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 1.8rem; font-weight: bold; display: block; }
        .total-leads { color: var(--blue); }
        .total-app { color: var(--green); }
        .total-unapp { color: var(--red); }
        .total-avg { color: var(--purple); }

        /* Table */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 15px; color: #8b949e; text-transform: uppercase; font-size: 0.85rem; }
        td { padding: 18px; text-align: center; font-size: 1.1rem; font-weight: 600; }
        .row-item { background: rgba(255,255,255,0.03); }
        
        .rank-box { background: #30363d; color: white; width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }
        .agent-name { text-align: left; padding-left: 20px; color: #ffffff; }

        .badge { padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; margin: 0 2px; }
        .bg-app { background: rgba(46, 160, 67, 0.2); color: var(--green); border: 1px solid var(--green); }
        .bg-unapp { background: rgba(248, 81, 73, 0.2); color: var(--red); border: 1px solid var(--red); }
        
        .avg-highlight { color: var(--purple); font-weight: 800; font-size: 1.3rem; }

        @media (max-width: 800px) { .stats-bar { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="company-name">Alixo BPO</h1>
        <div id="month-label" class="dashboard-title">Monthly Performance Monitor</div>
    </header>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="dashboard-title">MTD TOTAL</span>
            <span id="center-total" class="stat-number total-leads">0</span>
        </div>
        <div class="stat-card">
            <span class="dashboard-title">APPROVED</span>
            <span id="center-approved" class="stat-number total-app">0</span>
        </div>
        <div class="stat-card">
            <span class="dashboard-title">UN-APPROVED</span>
            <span id="center-unapproved" class="stat-number total-unapp">0</span>
        </div>
        <div class="stat-card">
            <span class="dashboard-title">DAILY AVG (MTD)</span>
            <span id="center-avg" class="stat-number total-avg">0</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th class="agent-name">Agent Name</th>
                <th>Total Leads</th>
                <th>Daily Avg</th>
                <th>Quality Status</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";
    
    // Auto-detect days passed in current month
    const today = new Date();
    const daysPassed = today.getDate(); 
    const monthName = today.toLocaleString('default', { month: 'long' });
    document.getElementById('month-label').innerText = `${monthName} Performance Dashboard (Day ${daysPassed})`;

    async function refreshLeaderboard() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const lines = text.split('\n').filter(l => l.trim().length > 0 && !l.includes('{'));
            const dataRows = lines.slice(1);

            const agentData = {};
            let globalTotal = 0;
            let globalApp = 0;

            dataRows.forEach(row => {
                const parts = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/);
                let name = (parts[0] || "Unknown").replace(/\"/g, "").trim().toUpperCase();
                let status = (parts[2] || "Not Approved").replace(/\"/g, "").trim().toLowerCase();

                if (!agentData[name]) {
                    agentData[name] = { name: name, total: 0, app: 0, unapp: 0 };
                }

                agentData[name].total++;
                globalTotal++;
                if (status === 'approved') { globalApp++; agentData[name].app++; }
                else { agentData[name].unapp++; }
            });

            // Global Monthly Daily Average
            const globalDailyAvg = (globalTotal / daysPassed).toFixed(2);
            document.getElementById('center-total').innerText = globalTotal;
            document.getElementById('center-approved').innerText = globalApp;
            document.getElementById('center-unapproved').innerText = (globalTotal - globalApp);
            document.getElementById('center-avg').innerText = globalDailyAvg;

            const sortedAgents = Object.values(agentData).sort((a, b) => b.total - a.total);

            let tableContent = '';
            sortedAgents.forEach((agent, index) => {
                // Individual Daily Average for the month
                const agentDailyAvg = (agent.total / daysPassed).toFixed(2);

                tableContent += `
                    <tr class="row-item">
                        <td><div class="rank-box">${index + 1}</div></td>
                        <td class="agent-name">${agent.name}</td>
                        <td>${agent.total}</td>
                        <td class="avg-highlight">${agentDailyAvg}</td>
                        <td>
                            <span class="badge bg-app">${agent.app} APP</span>
                            <span class="badge bg-unapp">${agent.unapp} UN-APP</span>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('leaderboard-body').innerHTML = tableContent;
        } catch (err) { console.error(err); }
    }

    refreshLeaderboard();
    setInterval(refreshLeaderboard, 15000);
</script>

</body>
</html>

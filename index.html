<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Live Performance</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #161b22; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        h1 { text-align: center; color: #58a6ff; text-transform: uppercase; letter-spacing: 2px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { color: #8b949e; text-transform: uppercase; font-size: 0.8rem; padding: 10px; }
        td { padding: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; }

        /* Color Logic */
        .row-approved { background: rgba(46, 160, 67, 0.15); color: #3fb950; border-left: 5px solid #3fb950; }
        .row-not-approved { background: rgba(248, 81, 73, 0.15); color: #f85149; border-left: 5px solid #f85149; }

        .badge { padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; color: white; text-transform: uppercase; }
        .bg-approved { background: #238636; }
        .bg-not-approved { background: #da3633; }

        .rank { background: #30363d; color: white; border-radius: 50%; width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; }
        .agent-name { text-align: left; padding-left: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Live Agent Performance</h1>
    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th class="agent-name">Agent Name</th>
                <th>Leads</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="leaderboard-content">
            <!-- Data will load here -->
        </tbody>
    </table>
</div>

<script>
    // Your verified CSV Link
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNUob6RgZZc4RWJfazbmerMCwcsZtJYulHpZk1FQPMm9rrnUKmTsTLzsXLaRGuEkDq_fuqIDGcAGAj/pub?output=csv";

    async function updateStats() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            
            // 1. Split into rows
            // 2. Filter out rows that are empty OR contain CSS brackets { }
            const rows = text.split('\n').filter(row => {
                const trimmed = row.trim();
                return trimmed.length > 0 && !trimmed.includes('{') && !trimmed.includes('}');
            });

            // Remove the header row (Agent Name, Leads, Status)
            const data = rows.slice(1);

            let agents = data.map(row => {
                const columns = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/); // Handles commas inside quotes
                return {
                    name: (columns[0] || "Unknown").replace(/\"/g, "").trim(),
                    leads: parseInt(columns[1]) || 0,
                    status: (columns[2] || "Not Approved").replace(/\"/g, "").trim()
                };
            });

            // Sort agents by lead count (highest first)
            agents.sort((a, b) => b.leads - a.leads);

            let html = '';
            agents.forEach((agent, index) => {
                const isApproved = agent.status.toLowerCase() === 'approved';
                const rowClass = isApproved ? 'row-approved' : 'row-not-approved';
                const badgeClass = isApproved ? 'bg-approved' : 'bg-not-approved';

                html += `
                    <tr class="${rowClass}">
                        <td><span class="rank">${index + 1}</span></td>
                        <td class="agent-name">${agent.name}</td>
                        <td>${agent.leads}</td>
                        <td><span class="badge ${badgeClass}">${agent.status}</span></td>
                    </tr>
                `;
            });

            document.getElementById('leaderboard-content').innerHTML = html;

        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // Initial load and refresh every 15 seconds
    updateStats();
    setInterval(updateStats, 15000);
</script>

</body>
</html>
